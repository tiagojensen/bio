<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Tiago Jensen</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Inter',sans-serif;
background:#06070a;
color:white;
overflow-x:hidden;
}

.container{
width:100%;
max-width:760px;
margin:0 auto;
padding:0 24px;
}

.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:80px 0;

background:
linear-gradient(rgba(0,0,0,.78),rgba(0,0,0,.94)),
url('https://images.unsplash.com/photo-1504052434569-70ad5836ab65?q=80&w=1974&auto=format&fit=crop');

background-size:cover;
background-position:center;
position:relative;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at top,
rgba(124,58,237,.18),
transparent 40%);
pointer-events:none;
}

.content{
width:100%;
text-align:center;
position:relative;
z-index:2;
}

.logo{
width:150px;
margin-bottom:28px;
filter:drop-shadow(0 10px 30px rgba(0,0,0,.45));
}

.badge{
display:inline-flex;
align-items:center;
gap:10px;
padding:10px 18px;
border:1px solid rgba(255,255,255,.1);
background:rgba(255,255,255,.05);
border-radius:999px;
font-size:14px;
margin-bottom:30px;
backdrop-filter:blur(12px);
color:#d6d6d6;
}

h1{
font-size:clamp(42px,7vw,78px);
line-height:1.02;
font-weight:800;
margin-bottom:26px;
letter-spacing:-2px;
}

.highlight{
background:linear-gradient(90deg,#60a5fa,#c084fc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.description{
max-width:760px;
margin:0 auto 46px;
font-size:20px;
line-height:1.7;
color:#d6d6d6;
}

.links{
display:flex;
flex-direction:column;
gap:18px;
margin-bottom:50px;
}

.link-btn{
display:flex;
align-items:center;
justify-content:center;
gap:14px;

padding:22px 28px;

border-radius:22px;

text-decoration:none;
font-size:18px;
font-weight:700;
color:white;

background:
linear-gradient(180deg,
rgba(255,255,255,.07),
rgba(255,255,255,.03));

border:1px solid rgba(255,255,255,.08);

transition:.35s ease;

backdrop-filter:blur(10px);
}

.link-btn:hover{
transform:translateY(-4px);
border-color:rgba(96,165,250,.35);

box-shadow:
0 18px 40px rgba(37,99,235,.18);
}

.link-btn i{
font-size:20px;
background:linear-gradient(90deg,#60a5fa,#c084fc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.socials{
display:flex;
justify-content:center;
gap:18px;
margin-top:10px;
}

.socials a{
width:58px;
height:58px;

display:flex;
align-items:center;
justify-content:center;

border-radius:18px;

text-decoration:none;
color:white;
font-size:22px;

background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);

transition:.3s ease;
}

.socials a:hover{
transform:translateY(-4px);
background:rgba(255,255,255,.08);
border-color:rgba(96,165,250,.4);

box-shadow:
0 14px 30px rgba(37,99,235,.18);
}

.footer{
margin-top:50px;
color:#8f8f8f;
font-size:14px;
}

@media(max-width:768px){

.hero{
padding:70px 0;
}

.logo{
width:125px;
}

.description{
font-size:18px;
}

.link-btn{
font-size:16px;
padding:20px;
}

.socials a{
width:52px;
height:52px;
font-size:20px;
}

}

.name{
font-size:clamp(52px,8vw,88px);
font-weight:800;
line-height:1;
margin-bottom:8px;
}

.username{
font-size:clamp(34px,6vw,64px);
font-weight:800;
line-height:1.2;
margin-bottom:30px;

background:linear-gradient(90deg,#60a5fa,#c084fc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

</style>
</head>

<body>

<section class="hero">

<div class="container">

<div class="content">

<!-- SUA LOGO -->
<img src="logo.png" alt="Logo" class="logo">

<h1 class="name">Tiago Jensen</h1>

<h2 class="username">@tiagojensen_</h2>

<p class="description">
Construa uma vida espiritual forte, 
com profundidade interior 
e amizade real com Deus.
</p>

<div class="links">

<a href="https://tiagoivaszek.github.io/sales-page/"
class="link-btn" target="_blank">

<i class="fa-solid fa-fire"></i>
Do Zero ao Amor

</a>

  <a href="https://tiagoivaszek.github.io/quiz-espiritual/"
class="link-btn" target="_blank">

<i class="fa-solid fa-chess-rook"></i>
Descubra sua Morada Espiritual

</a>

<a href="https://tiagojensen.github.io/store/"
class="link-btn" target="_blank">

<i class="fa-solid fa-book-bible"></i>
Livros Católicos

</a>



</div>

<div class="socials">

<a href="https://www.instagram.com/tiagojensen_/" target="_blank">
<i class="fa-brands fa-instagram"></i>
</a>

<a href="https://www.youtube.com/@tiago.jensen" target="_blank">
<i class="fa-brands fa-youtube"></i>
</a>

<a href="https://www.tiktok.com/@tiagojensen_" target="_blank">
<i class="fa-brands fa-tiktok"></i>
</a>

<a href="https://www.facebook.com/tiago.ivaszekjensen" target="_blank">
<i class="fa-brands fa-facebook-f"></i>
</a>

</div>

<div class="footer">
© 2026 • Tiago Jensen
</div>

</div>

</div>

</section>

</body>
</html>
